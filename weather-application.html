        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&display=swap');
        
        .weather-container {
  			display: flex;
  			flex-direction: column;
  			align-items: center;
  			justify-content: center;
  			height: 100vh;
		}

		.weather-box {
  			display: flex;
  			flex-direction: column;
  			align-items: center;
  			justify-content: center;
  			background-color: #A52A2A;
  			border-radius: 10px;
  			padding: 20px;
		}
        
        #temperature {
        	font-family: Oswald, sans-serif;
  			font-size: 50px;
 			margin: 0;
  		    color: white;
		}
        
		#humidity {
 	        color: white;
        	font-size: 20px;
            margin: 0;
        }
        
        #windspeed {
        	font-size: 20px;
            margin: 0;
            color: white;
        }
        
		#condition {
 	        color: white;
  			font-size: 20px;
  			margin: 0;
		}

		#location {
 	        color: white;
  			font-size: 20px;
  			margin: 0;
		}
        
        #error {
        	font-size: 15px;
            margin: 0;
            color: white;
        }
        
        input[type="text"] {
  			padding: 10px;
  			margin-right: 10px;
  			border-radius: 5px;
  			border: none;
            text-align: center;
            background-color: #FFFFFF;
		}

		button {
  			padding: 10px 20px;
  			border-radius: 5px;
  			border: none;
  			color: #FFFFFF;
            background-color: #808080;
  			cursor: pointer;
            margin-top: 20px;
		}</style><div class="weather-container"><div class="weather-box"><p id="temperature"></p><p id="humidity">Humidity: N/A</p><p id="windspeed">Wind Speed: N/A</p><p id="condition">Condition: N/A</p><p id="location"></p></div><input type="text" placeholder="Enter a location" id="search-bar"> <button id="search-btn">Search</button><p id="error"></p></div><script>function celsiusToFahrenheit(celsius) {
  		return (celsius * 9/5) + 32;
	}
    
    function mpsToKmph(mps) {
  		return mps * 3.6;
	}
	
	function mpsToMph(mps) {
 		return mps * 2.237;
	}
    
    function getWeatherData(location) {
  		const apiKey = "783475facc469d6d5dcebeda86e23878";
  		const url = `https://api.openweathermap.org/data/2.5/weather?q=${location}&units=metric&appid=${apiKey}`;
  		return fetch(url)
    		.then(response => response.json())
    		.then(data => {
      			const weatherData = {
        			temperature: data.main.temp,
        			humidity: data.main.humidity,
        			windspeed: data.wind.speed,
        			condition: data.weather[0].main,
        			location: data.name,
      			};
      		return weatherData;
    	});
	}
    
	function updateUI(weatherData) {
  		const temperature = document.querySelector("#temperature");
        const humidity = document.querySelector("#humidity");
        const windspeed = document.querySelector("#windspeed");
  		const condition = document.querySelector("#condition");
  		const location = document.querySelector("#location");
		
		temperature.textContent = `${weatherData.temperature}°C (${celsiusToFahrenheit(weatherData.temperature).toFixed(2)}°F)`;
		humidity.textContent = `Humidity: ${weatherData.humidity}%`;
        windspeed.textContent = `Wind Speed: ${weatherData.windspeed.toFixed(2)} m/s (${mpsToKmph(weatherData.windspeed).toFixed(2)} km/h, ${mpsToMph(weatherData.windspeed).toFixed(2)} mph)`;
  		condition.textContent = `Condition: ${weatherData.condition} `;
  		location.textContent = weatherData.location;
	}
    
	const searchBtn = document.querySelector("#search-btn");
	const searchBar = document.querySelector("#search-bar");

	searchBtn.addEventListener("click", () => {
  	  const location = searchBar.value;
  	  getWeatherData(location)
        .then(weatherData => {
          const msgError = document.querySelector("#error");
          msgError.textContent = ""
          updateUI(weatherData);
        })
        .catch(error => {
	  const msgError = document.querySelector("#error");
          msgError.textContent = "Error: Location not found"
          console.log(error);
        });
    });</script></div></div></article></main><footer class="footer"><div class="footer__copyright"><p class="align-left"><span style="color: #ffffff;">© - 2023 - skyquest -</span> <span style="color: #3598db;"><a href="https://realskyquest.github.io/privacy-policy.html" style="color: #3598db;">Privacy</a></span></p></div><button onclick="backToTopFunction()" id="backToTop" class="footer__bttop" aria-label="Back to top" title="Back to top"><svg><use xlink:href="https://realskyquest.github.io/assets/svg/svg-map.svg#toparrow"/></svg></button></footer></div><script defer="defer" src="https://realskyquest.github.io/assets/js/scripts.min.js?v=f47c11534595205f20935f0db2a62a85"></script><script>window.publiiThemeMenuConfig={mobileMenuMode:'sidebar',animationSpeed:300,submenuWidth: 'auto',doubleClickTime:500,mobileMenuExpandableSubmenus:true,relatedContainerForOverlayMenuSelector:'.top'};</script><script>var images = document.querySelectorAll('img[loading]');
        for (var i = 0; i < images.length; i++) {

                images[i].classList.add('is-loaded');
            } else {
                images[i].addEventListener('load', function () {
